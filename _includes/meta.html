<meta charset="utf-8" />
<meta content='text/html; charset=utf-8' http-equiv='Content-Type'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
{%- if page.excerpt %}
<meta name="description" content="{{ page.excerpt | strip_html | normalize_whitespace | truncate: 160 }}" />
<meta property="og:description" content="{{ page.excerpt | strip_html | normalize_whitespace | truncate: 160 }}" />
{%- else %}
<meta name="description" content="{{ site.description }}">
<meta property="og:description" content="{{ site.description }}" />
{%- endif %}
<meta name="author" content="{{ site.name }}" />
{%- if page.title %}
<meta property="og:title" content="{{ page.title }} | {{ site.name }}" />
{%- else %}
<meta property="og:title" content="{{ site.name }} {{ site.description }}" />
{%- endif %}
{%- if page.thumbnail %}
<meta property="og:image" content="{{ page.thumbnail | prepend: site.url }}">
{%- else %}
<meta property="og:image" content="{{ site.avatar | prepend: site.url }}">
{%- endif %}
<meta property="og:url" content="{{ page.url | prepend: site.url }}" />
<meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}" />
<meta property="og:site_name" content="{{ site.name }}" />
